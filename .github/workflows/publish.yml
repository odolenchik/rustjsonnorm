name: Publish

on:
  release:
    types: [published]

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: dist-wheels
          # macOS universal2 — build both architectures in one job
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: dist-wheels-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: dist-wheels-arm64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dist-wheels

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel for ${{ matrix.target }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out ${{ matrix.artifact_name }} --interpreter python3 --strip

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        run: |
          pip install twine>=1.5.0
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
