name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish wheel (Linux manylinux)
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --release --interpreter python3
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
