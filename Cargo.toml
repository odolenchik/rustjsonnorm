[package]
name = "fast-json-normalize"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]
name = "fast_json_normalize"

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py38"] }
simd-json = "0.13"
indexmap = "2"
rayon = "1.10"
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
